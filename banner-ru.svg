<svg width="1200" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="45%"  stop-color="#302b63"/>
      <stop offset="100%" stop-color="#1a1a4e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#7b7bff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#7b7bff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <circle cx="80"  cy="40"  r="2" fill="#7b7bff" opacity="0.4"/>
  <circle cx="150" cy="80"  r="1" fill="#7b7bff" opacity="0.3"/>
  <circle cx="60"  cy="160" r="3" fill="#4444cc" opacity="0.3"/>
  <circle cx="200" cy="130" r="1" fill="#aaaaff" opacity="0.4"/>
  <circle cx="1100" cy="50"  r="2" fill="#7b7bff" opacity="0.4"/>
  <circle cx="1050" cy="160" r="3" fill="#4444cc" opacity="0.3"/>
  <circle cx="1150" cy="120" r="1" fill="#aaaaff" opacity="0.4"/>
  <circle cx="980"  cy="80"  r="2" fill="#7b7bff" opacity="0.3"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#lineGrad)" opacity="0.8"/>

  <!-- Bottom accent line -->
  <rect x="0" y="217" width="1200" height="3" fill="url(#lineGrad)" opacity="0.8"/>

  <!-- Main title -->
  <text
    x="600" y="102"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="56"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#glow)"
    letter-spacing="2">Email Grabber Pro</text>

  <!-- Subtitle -->
  <text
    x="600" y="155"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#aaaaee"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1">>@?>@0B82=K9 :><?;5:A 4;O 0=0;870 email 8 157>?0A=>AB8</text>

  <!-- Small decorative separator -->
  <rect x="500" y="130" width="200" height="1" fill="#7b7bff" opacity="0.5"/>
</svg>
